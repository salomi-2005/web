<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        /* Tag By Class */
        /* different tag same styling we use class */
        /* same tag different styling we use id */
        .abc{
            color:red;
        }
    </style>
</head>
<body>
    <h1 class="abc">Good Evening</h1>

    <div class="abc">football</div>

    <p class="abc">cricket</p>

    <p>kabaddi</p>
</body>
</html>
